<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Health Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="data.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --border:#30363d;
            --text:#e6edf3; --muted:#8b949e;
            --red:#ff4444; --orange:#ff8c00; --yellow:#ffd700; --green:#238636;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'IBM Plex Sans', sans-serif; margin: 20px; 
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 8px; padding: 20px; margin-bottom: 20px; 
        }
        h1, h2 { color: var(--text); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; }
        .green { color: var(--green); background: rgba(35,134,54,0.1); }
        .yellow { color: var(--yellow); background: rgba(255,215,0,0.1); }
        .orange { color: var(--orange); background: rgba(255,140,0,0.1); }
        .red { color: var(--red); background: rgba(255,68,68,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Node Health Dashboard</h1>
        <p style="color:var(--muted)">Operational Network Intelligence</p>
    </div>

    <div class="card">
        <h2>Network Quality Trends</h2>
        <canvas id="mainChart" height="100"></canvas>
    </div>

    <div class="card">
        <h2>Chronic Node Performance</h2>
        <table id="chronicTable">
            <thead>
                <tr>
                    <th>Node</th>
                    <th>NID Score</th>
                    <th>QoE</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="chronicTbody"></tbody>
        </table>
    </div>
</div>

<script>
/** * DASHBOARD LOGIC
 * This script waits for data.js to load the RAW object.
 */
document.addEventListener('DOMContentLoaded', function() {
    // 1. Verify data exists
    if (typeof RAW === 'undefined') {
        console.error("Error: data.js not found or RAW object missing.");
        document.body.innerHTML = "<h1 style='color:white; text-align:center;'>Error: data.js not loaded.</h1>";
        return;
    }

    // 2. Create Calculated Metrics (ADV)
    const ADV = {
        chronic: RAW.top_chronic || [],
        history: RAW.nid_summary || []
    };

    initDashboard(ADV);
});

function initDashboard(ADV) {
    renderChart(ADV.history);
    fillChronicTable(ADV.chronic);
}

function renderChart(history) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: history.map(d => d.date),
            datasets: [{
                label: 'Green Pct (%)',
                data: history.map(d => d.green_pct),
                borderColor: '#238636',
                tension: 0.3,
                fill: false
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: false, grid: { color: '#30363d' } },
                x: { grid: { display: false } }
            },
            plugins: { legend: { labels: { color: '#e6edf3' } } }
        }
    });
}

function fillChronicTable(nodes) {
    const tbody = document.getElementById('chronicTbody');
    tbody.innerHTML = '';
    nodes.forEach(n => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="font-family:monospace">${n.node}</td>
            <td>${n.nid.toFixed(1)}%</td>
            <td>${n.qoe.toFixed(1)}</td>
            <td><span class="badge ${n.nid_bucket}">${n.nid_bucket.toUpperCase()}</span></td>
        `;
        tbody.appendChild(tr);
    });
}
</script>

</body>
</html>
