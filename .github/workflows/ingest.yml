name: Ingest Daily Node Health Data
 
on:
  push:
    paths:
      - 'inbox/**'   # triggers whenever you push files into the inbox/ folder
 
  workflow_dispatch:  # also allows manual trigger from GitHub UI
 
jobs:
  ingest:
    runs-on: ubuntu-latest
 
    permissions:
      contents: write   # needed to commit data.js back to the repo
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install pandas openpyxl
 
      - name: Find new inbox files
        id: find_files
        run: |
          NID=$(ls inbox/Node_Scoring_*.xlsx 2>/dev/null | sort | tail -1)
          QOE=$(ls inbox/*.csv 2>/dev/null | sort | tail -1)
          echo "nid_file=$NID" >> $GITHUB_OUTPUT
          echo "qoe_file=$QOE" >> $GITHUB_OUTPUT
          echo "Found NID: $NID"
          echo "Found QoE: $QOE"
 
      - name: Run ingestion script
        run: |
          python ingest.py \
            --nid "${{ steps.find_files.outputs.nid_file }}" \
            --qoe "${{ steps.find_files.outputs.qoe_file }}" \
            --datajs data.js
 
      - name: Move processed files to archive/
        run: |
          mkdir -p archive
          mv inbox/Node_Scoring_*.xlsx archive/ 2>/dev/null || true
          mv inbox/*.csv archive/ 2>/dev/null || true
 
      - name: Commit updated data.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js archive/
          git diff --staged --quiet || git commit -m "📊 Auto-ingest: $(date -u +'%Y-%m-%d') node health data"
          git push
